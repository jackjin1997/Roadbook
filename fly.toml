# fly.toml app configuration file generated for roadbook on 2026-03-16T23:22:21+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'roadbook'
primary_region = 'nrt'

[build]

[env]
  ARIADNE_DATA_DIR = '/data'
  ARIADNE_PORT = '8080'
  NODE_ENV = 'production'

[[mounts]]
  source = 'roadbook_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
